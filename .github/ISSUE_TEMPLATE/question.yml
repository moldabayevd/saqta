name: ❓ Вопрос
description: Что-то непонятно, нужен совет
title: "[Question] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Прежде чем задавать вопрос — посмотри [FAQ](https://github.com/YOUR_USERNAME/saqta-with-stt#-faq) и [docs/troubleshooting.md](../blob/main/docs/troubleshooting.md).

  - type: textarea
    id: question
    attributes:
      label: Вопрос
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Контекст
      description: Что уже пробовал? На каком этапе застрял?
